# tmux.conf

# Remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Start index at 1
set -g base-index 1
set -g pane-base-index 1

# Split panes using = and -
bind = split-window -h
bind - split-window -v
unbind '"'
unbind %

# Enable mouse mode
set -g mouse on

# Reload config file
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Pane navigation with h, j, k, l
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Repeatable pane resizing with arrow keys
bind -r Left  resize-pane -L 5
bind -r Right resize-pane -R 5
bind -r Up    resize-pane -U 5
bind -r Down  resize-pane -D 5

# Don't rename windows automatically
set-option -g allow-rename off

# Status bar
set -g status-bg colour235 # Very dark gray
set -g status-fg white
set -g status-left-length 30
set -g status-left '#[fg=colour235,bg=colour214,bold] #S #[fg=colour214,bg=colour235]'
set -g status-right '#[fg=colour214,bg=colour235]#[fg=colour235,bg=colour214,bold] %Y-%m-%d %H:%M '

# Window status
set -g window-status-format '#[fg=colour244,bg=colour235] #I:#W '
set -g window-status-current-format '#[fg=colour214,bg=colour235,bold] #I:#W '

# Pane borders
set -g pane-border-style fg=colour239
set -g pane-active-border-style fg=colour214

# Message style
set -g message-style fg=colour235,bg=colour214,bold
